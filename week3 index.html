<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介３人分</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col md:flex-row justify-center items-center p-6 h-screen">
  <div class="flex flex-col md:flex-row items-stretch gap-6">
    <div class="flex flex-col flex-1 rounded-lg shadow border border-red-600">
        <header class="bg-red-600 text-white text-lg font-bold p-4 rounded-t-lg">鳴子章吉</header>
        <div class="flex justify-center">
            <img src="./img/downloaded2.jpg" alt="鳴子章吉" class="w-auto h-64 object-contain">
        </div>
        <br>
        <ul class="p-4">
            <li>タイプ：オールラウンダー</li>
            <li>愛車：PINARELLO</li>
            <li>総北高校２年。赤髪がトレードマークの派手好き。大阪出身。</li>
        </ul>
    </div>
    <div class="flex flex-col flex-1 rounded-lg shadow border border-yellow-300">
        <header class="bg-yellow-300 text-white text-lg font-bold p-4 rounded-t-lg">小野田坂道</header>
        <div class="flex justify-center">
            <img src="./img/downloaded1.jpg" alt="小野田坂道" class="w-auto h-64 object-contain">
        </div>
        <br>
        <ul class="p-4">
            <li>タイプ：クライマー</li>
            <li>愛車：BMC</li>
            <li>ママチャリで激坂を登り、往復で90kmの秋葉原への道のりを毎週欠かさず通うアニメ好きの高校２年生。</li>
        </ul>
    </div>
    <div class="flex flex-col flex-1 rounded-lg shadow border border-sky-800">
        <header class="bg-sky-800 text-white text-lg font-bold p-4 rounded-t-lg">今泉俊輔</header>
        <div class="flex justify-center">
            <img src="./img/downloaded3.jpg" alt="今泉俊輔" class="w-auto h-64 object-contain">
        </div>
        <br>
        <ul class="p-4">
            <li>タイプ：オールラウンダー</li>
            <li>愛車：SCCOT</li>
            <li>総北高校２年。世界最速を目指し日々ストイックに走り続ける。</li>
        </ul>
    </div>
  </div>
</body>
